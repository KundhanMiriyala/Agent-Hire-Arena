name: AgentHire Arena
id: agenthire-arena
version: "1.0.0"
description: >
  OpenEnv environment for evaluating agent hiring decisions under uncertainty,
  cost constraints, and delayed feedback.
license: MIT
language: python

entrypoint:
  module: server.environment
  class: HiringEnvironment

models:
  action: models.HiringAction
  observation: models.HiringObservation
  reward: models.HiringReward
  state: models.HiringState

api:
  reset_endpoint: /reset
  step_endpoint: /step
  state_endpoint: /state

requirements_file: requirements.txt

tags:
  - openenv
  - benchmarking
  - hiring

tasks:
  - name: easy
    description: "5 candidates, low noise. Pick the best candidate from clean signals."
    budget: 300
    num_candidates: 5
    noise_level: 0.05
    decoy_fraction: 0.0

  - name: medium
    description: "Moderate noise, requires building a well-rounded team."
    budget: 180
    num_candidates: 15
    noise_level: 0.20
    decoy_fraction: 0.10
    role_requirements: ["Backend", "Frontend", "Data Scientist"]

  - name: hard
    description: "20 candidates, high noise + 25% decoys. Zero budget slack. Misleading resumes."
    budget: 200
    num_candidates: 20
    noise_level: 0.30
    decoy_fraction: 0.25

  - name: adversarial
    description: "20 candidates, high noise + 35% decoys. Budget restricts heavy exploration."
    budget: 180
    num_candidates: 20
    noise_level: 0.35
    decoy_fraction: 0.35
    coached_fraction: 0.25
    adversarial: true
    adversarial_start_step: 5

  - name: nightmare
    description: "25 candidates, 50% decoys. Brutal resource allocation constraint."
    budget: 180
    num_candidates: 25
    noise_level: 0.50
    decoy_fraction: 0.50
    role_requirements: ["Backend", "Frontend", "Data Scientist"]
    coached_fraction: 0.40
    adversarial: true
    adversarial_start_step: 3

action_space:
  type: discrete
  actions:
    - name: interview
      parameters:
        candidate_id: string
      cost: 10
      description: "Reveals interview_score for the candidate. Can only be done once per candidate."

    - name: probe
      parameters:
        candidate_id: string
      cost: 20
      description: "Requires a prior interview. Reveals a truth-aligned probe_score and interview-probe gap for coaching detection."

    - name: hire
      parameters:
        candidate_id: string
      cost: 50
      description: "Hires the candidate. Blind hire (without prior interview) incurs step penalty."

    - name: skip
      parameters:
        candidate_id: string
      cost: 0
      description: "Permanently rejects a candidate. No cost."

    - name: finalize
      parameters: {}
      cost: 0
      description: "Ends the episode and triggers the grader."

observation_space:
  fields:
    - name: candidates
      type: List[CandidateProfile]
      description: "All candidates with resume_score visible; true_skill hidden."

    - name: budget_remaining
      type: float
      description: "Remaining budget units."

    - name: interviews_done
      type: "Dict[str, float]"
      description: "Maps candidate_id to interview_score for already-interviewed candidates."

    - name: probes_done
      type: "Dict[str, float]"
      description: "Maps candidate_id to truth-aligned probe_score for already-probed candidates."

    - name: probe_gaps
      type: "Dict[str, float]"
      description: "Maps candidate_id to interview_score minus probe_score for coaching-risk comparison."

    - name: hires_made
      type: List[str]
      description: "List of hired candidate_ids."

    - name: skipped
      type: List[str]
      description: "List of permanently rejected candidate_ids."

    - name: step_num
      type: int
      description: "Current step index."

    - name: max_steps
      type: int
      description: "Maximum steps allowed for this task."

    - name: last_action_result
      type: string
      description: "Human-readable outcome of the previous action."

    - name: done
      type: bool
      description: "True when the episode has ended."

reward:
  step_level:
    - event: "invalid or unknown action/candidate"
      value: -0.02
    - event: "duplicate interview/probe/hire/skip"
      value: -0.02
    - event: "interview in uncertain zone (resume 0.4-0.75)"
      value: +0.04
    - event: "useful probe (|interview-probe gap| >= 0.20)"
      value: +0.05
    - event: "probe on high-risk profile (high resume/interview)"
      value: +0.03
    - event: "low-value probe under tight budget"
      value: -0.02
    - event: "blind hire (without interview)"
      value: -0.10
    - event: "strong-evidence hire"
      value: +0.08
    - event: "hire covering missing required role"
      value: +0.04
    - event: "suspicious hire with large interview/probe disagreement"
      value: -0.08
    - event: "skip weak low-evidence candidate"
      value: +0.02
    - event: "skip decoy/coaching-signal candidate after probe"
      value: +0.04
    - event: "time drift (non-finalize step after step 3)"
      value: -0.005
    - event: "episode becomes effectively budget-stuck"
      value: -0.10

  final:
    formula: "clip((avg_true_skill + team_size_bonus + role_coverage_bonus - cost_penalty - decoy_penalty) * early_finalize_multiplier, 0, 1)"
    notes:
      - "team_size_bonus = min(team_size/3, 1) * 0.25"
      - "role_coverage_bonus = 0.20 * covered_required_roles_fraction"
      - "cost_penalty = (cost_ratio^1.3) * 0.40"
      - "decoy_penalty = 0.25 * decoy_hire_ratio"
      - "early_finalize_multiplier = 0.70 when finalize before step 3, else 1.0"
      - "On finalize, step_reward returns final_score for terminal learning alignment"

endpoints:
  reset:
    method: POST
    path: /reset
    body:
      task: string

  step:
    method: POST
    path: /step
    body:
      action: string
      candidate_id: string (optional)

  state:
    method: GET
    path: /state
