name: AgentHire Arena
id: agenthire-arena
version: "1.0.0"
description: >
  OpenEnv environment for evaluating agent hiring decisions under uncertainty,
  cost constraints, and delayed feedback.
license: MIT
language: python

entrypoint:
  module: server.environment
  class: HiringEnvironment

models:
  action: models.HiringAction
  observation: models.HiringObservation
  reward: models.HiringReward
  state: models.HiringState

api:
  reset_endpoint: /reset
  step_endpoint: /step
  state_endpoint: /state

requirements_file: requirements.txt

tags:
  - openenv
  - benchmarking
  - hiring

tasks:
  - name: easy
    description: "5 candidates, low noise. Pick the best candidate from clean signals."
    budget: 300
    num_candidates: 5
    noise_level: 0.05
    decoy_fraction: 0.0

  - name: medium
    description: "10 candidates, medium noise. Balance interview cost vs hire quality."
    budget: 220
    num_candidates: 10
    noise_level: 0.15
    decoy_fraction: 0.0

  - name: hard
    description: "20 candidates, high noise + 25% decoys. Zero budget slack. Misleading resumes."
    budget: 200
    num_candidates: 20
    noise_level: 0.30
    decoy_fraction: 0.25

  - name: adversarial
    description: "20 candidates, 25% coached decoys + live adversarial NPC hiring manager pressure."
    budget: 200
    num_candidates: 20
    noise_level: 0.30
    decoy_fraction: 0.25
    coached_fraction: 0.25
    adversarial: true
    adversarial_start_step: 5

  - name: nightmare
    description: "25 candidates, 40% coached decoys, tightest budget, escalating NPC pressure."
    budget: 180
    num_candidates: 25
    noise_level: 0.35
    decoy_fraction: 0.40
    coached_fraction: 0.40
    adversarial: true
    adversarial_start_step: 3

action_space:
  type: discrete
  actions:
    - name: interview
      parameters:
        candidate_id: string
      cost: 10
      description: "Reveals interview_score for the candidate. Can only be done once per candidate."

    - name: probe
      parameters:
        candidate_id: string
      cost: 20
      description: "Requires a prior interview. Reveals a truth-aligned probe_score and interview-probe gap for coaching detection."

    - name: hire
      parameters:
        candidate_id: string
      cost: 50
      description: "Hires the candidate. Blind hire (without prior interview) incurs step penalty."

    - name: skip
      parameters:
        candidate_id: string
      cost: 0
      description: "Permanently rejects a candidate. No cost."

    - name: finalize
      parameters: {}
      cost: 0
      description: "Ends the episode and triggers the grader."

observation_space:
  fields:
    - name: candidates
      type: List[CandidateProfile]
      description: "All candidates with resume_score visible; true_skill hidden."

    - name: budget_remaining
      type: float
      description: "Remaining budget units."

    - name: interviews_done
      type: "Dict[str, float]"
      description: "Maps candidate_id to interview_score for already-interviewed candidates."

    - name: probes_done
      type: "Dict[str, float]"
      description: "Maps candidate_id to truth-aligned probe_score for already-probed candidates."

    - name: probe_gaps
      type: "Dict[str, float]"
      description: "Maps candidate_id to interview_score minus probe_score for coaching-risk comparison."

    - name: hires_made
      type: List[str]
      description: "List of hired candidate_ids."

    - name: skipped
      type: List[str]
      description: "List of permanently rejected candidate_ids."

    - name: step_num
      type: int
      description: "Current step index."

    - name: max_steps
      type: int
      description: "Maximum steps allowed for this task."

    - name: last_action_result
      type: string
      description: "Human-readable outcome of the previous action."

    - name: done
      type: bool
      description: "True when the episode has ended."

reward:
  step_level:
    - event: "invalid, missing, or impossible action"
      value: -20
    - event: "duplicate action on already processed candidate"
      value: -20
    - event: "non-finalize step after step 3"
      value: -5
    - event: "interview candidate in uncertain zone (resume 0.4-0.75)"
      value: +40
    - event: "useful probe reveals interview-probe gap >= 0.20"
      value: +50
    - event: "probe high-risk candidate"
      value: +30
    - event: "low-value probe under tight budget"
      value: -20
    - event: "hire with strong interview/probe evidence"
      value: +80
    - event: "hire covers missing required role"
      value: +40
    - event: "hire despite suspicious signal disagreement"
      value: -80
    - event: "blind hire (hire without interview)"
      value: -100
    - event: "skip weak candidate"
      value: +20
    - event: "skip candidate with decoy/coaching signal"
      value: +40
    - event: "budget exhausted"
      value: -100

  final:
    all_tasks: "avg_true_skill + team_size_bonus + role_coverage_bonus - cost_penalty - decoy_penalty, with early finalize multiplier, clipped [0, 1]"
    terminal_step_reward: "On finalize, step_reward equals final_score."

endpoints:
  reset:
    method: POST
    path: /reset
    body:
      task: string

  step:
    method: POST
    path: /step
    body:
      action: string
      candidate_id: string (optional)

  state:
    method: GET
    path: /state
